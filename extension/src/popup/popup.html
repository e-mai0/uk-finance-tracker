<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trackr Autofill</title>
    <style>
      :root { color-scheme: light; }
      body {
        width: 300px; margin: 0; padding: 14px;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        color: #1b1714; background: #fffdf8;
      }
      h1 { font-size: 15px; margin: 0 0 2px; color: #7c2433; letter-spacing: -.01em; }
      p.sub { font-size: 11px; color: #6a6258; margin: 0 0 12px; }
      label { display: block; font-size: 11px; font-weight: 600; margin: 10px 0 4px; }
      input, select {
        width: 100%; box-sizing: border-box; height: 32px; padding: 0 8px;
        font: inherit; font-size: 12px; border: 1px solid #d6cfbd; border-radius: 7px; background: #fff;
      }
      button {
        width: 100%; height: 34px; margin-top: 12px; border: 0; border-radius: 8px;
        font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
        background: #7c2433; color: #fdf6f0;
      }
      button:hover { background: #641b27; }
      button.sec { background: transparent; color: #1b1714; border: 1px solid #d6cfbd; }
      button.sec:hover { background: #f0ece1; }
      .status { font-size: 12px; padding: 8px 10px; border-radius: 7px; margin-bottom: 4px; }
      .connected { background: #e6efe5; color: #2f6a45; }
      .disconnected { background: #f6e6dc; color: #b1431f; }
      .msg { font-size: 11px; margin-top: 8px; min-height: 14px; }
      .ok { color: #2f6a45; }
      .err { color: #b1431f; }
      .foot { font-size: 10px; color: #9b9385; margin-top: 12px; line-height: 1.4; }
      .hide { display: none; }
    </style>
  </head>
  <body>
    <h1>Trackr Autofill</h1>
    <p class="sub">Fills application forms from your Trackr profile. You always review and submit.</p>

    <div id="status" class="status disconnected">Not connected</div>

    <div id="connectForm">
      <label for="apiBase">Trackr URL</label>
      <select id="apiBase">
        <option value="https://trackr-brown.vercel.app">trackr-brown.vercel.app</option>
        <option value="http://localhost:3000">localhost:3000 (dev)</option>
      </select>
      <label for="token">Connection token</label>
      <input id="token" type="password" placeholder="trk_… (from Trackr → Settings)" />
      <button id="connect">Connect</button>
    </div>

    <button id="disconnect" class="sec hide">Disconnect</button>

    <div id="msg" class="msg"></div>

    <p class="foot">
      Get a token in Trackr → Settings → Browser extension. Tip: generating the
      token there can connect this extension automatically.
    </p>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
